{% extends "base.html" %}

{% block content %}
  <h1>drivers</h1>
  {% if drivers_list %}
    <ul>
      {% for drivers in drivers_list %}
        <li><a href="{% url 'drivers-detail' drivers.id %}">{{ drivers.first_name }} {{ drivers.last_name  }} </a> </li>
      {% endfor %}
    </ul>
  {% endif %}
{% endblock %}
