{% extends "base.html" %}

{% block content %}
  <h1>Car list</h1>

  {% if car_list %}
    <table class="table">
      <thead>
        <tr>
          <th>ID</th>
          <th>Model</th>
          <th>manufacturer</th>
        </tr>
      </thead>
      <tbody>
        {% for car in car_list %}
          <tr>
            <td>{{ car.id }}</td>
            <td>
              <a href="{% url 'taxi:driver-detail' pk=car.id %}">{{ car.model }}</a>
            </td>
            <td>{{ driver.manufacturer }}</td>
          </tr>
        {% endfor %}
      </tbody>
    </table>
  {% else %}
    <p>No drivers found.</p>
  {% endif %}
{% endblock %}
